<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আরও | Sylhetin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=13">
</head>
<body>
<div class="page-wrap">

    <header class="app-header">
        <div class="logo">আরও<span class="slogan">সেটিংস ও অন্যান্য</span></div>
        <nav class="top-nav">
            <a href="index.html">🏠</a>
        </nav>
    </header>

    <main class="container">

        <div class="card">
            <h3>🌐 ভাষা</h3>
            <div class="chip-rail" id="langChips">
                <div class="chip" data-lang="sylheti">সিলেটি</div>
                <div class="chip" data-lang="bangla">বাংলা</div>
                <div class="chip" data-lang="english">English</div>
            </div>
        </div>

        <div class="card">
            <ul class="menu-list">
                <li onclick="window.location.href='friends.html'">👥 বন্ধুরা <span>›</span></li>
                <li onclick="window.location.href='my-majlis.html'">🏠 আমার মজলিস <span>›</span></li>
                <li onclick="window.location.href='more-detail.html?type=settings'">⚙️ সেটিংস <span>›</span></li>
                <li onclick="window.location.href='more-detail.html?type=privacy'">🔒 নিরাপত্তা ও গোপনীয়তা <span>›</span></li>
                <li onclick="window.location.href='more-detail.html?type=about'">ℹ️ আমাদের সম্পর্কে <span>›</span></li>
                <li onclick="window.location.href='more-detail.html?type=help'">❓ সাহায্য ও সহায়তা <span>›</span></li>
                <li class="logout" id="logoutBtn">🚪 লগ আউট</li>
            </ul>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html">🏠 ঘর</a>
        <a href="majlis.html">👥 মজলিস</a>
        <a href="create-post.html">➕ পোস্ট</a>
        <a href="news.html">🔔 খবর</a>
        <a href="more.html">☰ আরও</a>
    </nav>

    <div class="toast" id="toast"></div>

</div>
<script src="app.js?v=13"></script>
<script>
    // ভাষা নির্বাচন
    const langChips = document.querySelectorAll('#langChips .chip');
    const savedLang = localStorage.getItem('sylhetin_lang') || 'sylheti';
    langChips.forEach(function (chip) {
        if (chip.getAttribute('data-lang') === savedLang) chip.classList.add('active');
        chip.addEventListener('click', function () {
            langChips.forEach(function (c) { c.classList.remove('active'); });
            chip.classList.add('active');
            localStorage.setItem('sylhetin_lang', chip.getAttribute('data-lang'));
            if (window.Sylhetin) window.Sylhetin.showToast('ভাষা নির্বাচন করা অইছে: ' + chip.textContent);
        });
    });

    // লগ আউট
    document.getElementById('logoutBtn').addEventListener('click', function () {
        const sure = confirm('আফনে কি লগ আউট করতে চান?');
        if (!sure) return;
        Object.keys(localStorage).forEach(function (key) {
            if (key.indexOf('sylhetin_') === 0 || key === 'myNewPost' || key === 'myNewPostImage') {
                localStorage.removeItem(key);
            }
        });
        window.location.href = 'index.html';
    });
</script>
</body>
</html>
