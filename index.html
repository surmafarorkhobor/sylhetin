<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SylNet | আপনার ডিজিটাল ঘর</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ছোট কিছু স্টাইল যাতে পোস্টগুলো আলাদা বোঝা যায় */
        .post { margin-bottom: 20px; padding: 15px; border-bottom: 1px solid #eee; }
        .user-name { font-weight: bold; margin-bottom: 5px; color: #333; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="app-header">
        <div class="logo"><strong>SylNet</strong></div>
        <nav class="top-nav">
            <span>🔍</span>
            <span>💬</span>
            <a href="profile.html" style="text-decoration: none; color: inherit;">👤</a>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="container">
        
        <!-- পোস্ট বক্স -->
        <div class="card post-input-box" style="padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px;">
            <div class="user-avatar" style="display: inline-block; margin-right: 10px;">👤</div>
            <input type="text" placeholder="নয়া কিতা অইলো?" style="border: none; outline: none; width: 80%;">
        </div>

        <!-- পোস্ট ১ -->
        <div class="card post">
            <div class="user-name">আব্দুর রাজ্জাক</div>
            <p>আজকের আবহাওয়াটা বেশ সুন্দর।</p>
            <div class="post-actions" style="font-size: 0.9em; color: gray;">
                <span>👍 ফছন অইছে</span> | <span>💬 মতামত</span>
            </div>
        </div>

        <!-- পোস্ট ২ -->
        <div class="card post">
            <div class="user-name">আরিফ চৌধুরী</div>
            <p>সিলেটের চা বাগানের দৃশ্যগুলো সব সময় মন ভালো করে দেয়।</p>
            <div class="post-actions" style="font-size: 0.9em; color: gray;">
                <span>👍 ফছন অইছে</span> | <span>💬 মতামত</span>
            </div>
        </div>

        <!-- পোস্ট ৩ -->
        <div class="card post">
            <div class="user-name">সাফিয়া বেগম</div>
            <p>নতুন একটি সিলেটী কবিতার বই কিনলাম আজ, খুব ভালো লাগছে।</p>
            <div class="post-actions" style="font-size: 0.9em; color: gray;">
                <span>👍 ফছন অইছে</span> | <span>💬 মতামত</span>
            </div>
        </div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" style="text-decoration: none; color: inherit;">🏠 ঘর</a>
        <a href="majlis.html" style="text-decoration: none; color: inherit;">👥 মজলিস</a>
        <a href="create-post.html" style="text-decoration: none; color: inherit;">➕ পোস্ট</a>
        <a href="news.html" style="text-decoration: none; color: inherit;">🔔 খবর</a>
        <a href="more.html" style="text-decoration: none; color: inherit;">☰ আরও</a>
    </nav>

</body>
</html>
