<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">

<body>

    <header class="app-header">
        <div class="logo"><strong>SylNet</strong></div>
        <nav class="top-nav">
            <span>🔍</span>
            <span>💬</span>
            <a href="profile.html">👤</a>
        </nav>
    </header>

    <main class="container">
        
        <div class="card post-input-box">
            <div class="user-avatar">👤</div>
            <input type="text" placeholder="নয়া কিতা অইলো?">
        </div>

        <div class="card post">
            <div class="user-name">আব্দুর রাজ্জাক</div>
            <p>আজকের আবহাওয়াটা বেশ সুন্দর।</p>
            <div class="post-actions">
                <span>👍 ফছন অইছে</span> | <span>💬 মতামত</span>
            </div>
        </div>

        <div class="card post">
            <div class="user-name">আরিফ চৌধুরী</div>
            <p>সিলেটের চা বাগানের দৃশ্যগুলো সব সময় মন ভালো করে দেয়।</p>
            <div class="post-actions">
                <span>👍 ফছন অইছে</span> | <span>💬 মতামত</span>
            </div>
        </div>

        <div class="card post">
            <div class="user-name">সাফিয়া বেগম</div>
            <p>নতুন একটি সিলেটী কবিতার বই কিনলাম আজ, খুব ভালো লাগছে।</p>
            <div class="post-actions">
                <span>👍 ফছন অইছে</span> | <span>💬 মতামত</span>
            </div>
        </div>

    </main>

    <nav class="bottom-nav">
        <a href="index.html">🏠 ঘর</a>
        <a href="majlis.html">👥 মজলিস</a>
