<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নতুন পোস্ট | Sylhetin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=15">
</head>
<body>
<div class="page-wrap">

    <header class="app-header">
        <div class="logo" id="cpTitle">নতুন পোস্ট<span class="slogan" id="cpSlogan">নয়া কিতা অইলো?</span></div>
        <nav class="top-nav">
            <a href="#" id="cpCloseBtn">✕</a>
        </nav>
    </header>

    <main class="container">
        <div class="card">
            <div class="post-head" style="padding:0 0 12px; cursor:default;">
                <div class="user-avatar">👤</div>
                <div class="meta">
                    <div class="user-name">আপনি</div>
                    <div class="post-time" id="cpContextLabel">হোম ফিডে পোস্ট হবে</div>
                </div>
            </div>

            <!-- নিউজ পেজের জন্য এক্সট্রা ফিল্ড -->
            <div id="newsFieldsBox" style="display:none;">
                <input type="text" id="newsHeadline" placeholder="হেডলাইন লেখউক্কা..." class="form-input" style="margin-bottom:8px;">
                <select id="newsCategory" class="form-input" style="margin-bottom:8px;">
                    <option value="সিলেট">সিলেট</option>
                    <option value="বাংলাদেশ">বাংলাদেশ</option>
                    <option value="আন্তর্জাতিক">আন্তর্জাতিক</option>
                    <option value="রাজনীতি">রাজনীতি</option>
                    <option value="অর্থনীতি">অর্থনীতি</option>
                    <option value="খেলাধুলা">খেলাধুলা</option>
                    <option value="শিক্ষা">শিক্ষা</option>
                    <option value="ইসলাম">ইসলাম</option>
                    <option value="প্রযুক্তি">প্রযুক্তি</option>
                    <option value="বিনোদন">বিনোদন</option>
                    <option value="প্রবাস">প্রবাস</option>
                </select>
                <input type="text" id="newsReporter" placeholder="প্রতিবেদকের নাম (ঐচ্ছিক)" class="form-input" style="margin-bottom:8px;">
            </div>

            <textarea id="postText" placeholder="আফনার মনর কতা এইঠে লেখউক্কা..." style="width: 100%; height: 90px;"></textarea>

            <!-- ছবি থাম্বনেইল প্রিভিউ (একাধিক) -->
            <div id="imageThumbsRow" class="image-thumbs-row"></div>

            <!-- ভিডিও প্রিভিউ -->
            <div id="videoPreviewBox" style="display:none; margin-top:10px; position:relative;">
                <video id="videoPreview" src="" controls style="width:100%; border-radius:var(--radius-sm); display:block; background:#000;"></video>
                <button type="button" class="media-remove-btn" id="removeVideoBtn">✕</button>
            </div>

            <!-- জরিপ (Poll) বিল্ডার -->
            <div id="pollBuilderBox" style="display:none; margin-top:10px;">
                <input type="text" id="pollQuestion" placeholder="জরিপর প্রশ্ন লেখউক্কা..." style="width:100%; border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 12px; font-family:inherit; font-size:13.5px; background:var(--bg); color:var(--text); margin-bottom:8px;">
                <div id="pollOptionsList"></div>
                <button type="button" id="addPollOptionBtn" style="border:1px dashed var(--border); background:none; color:var(--green-deep); font-weight:700; font-size:12.5px; padding:8px; width:100%; border-radius:var(--radius-sm); cursor:pointer; font-family:inherit;">➕ অপশন যোগ করো</button>
                <button type="button" id="removePollBtn" class="media-remove-btn" style="position:static; margin-top:8px; width:100%; border-radius:var(--radius-sm); background:#E5484D;">✕ জরিপ বাদ দাও</button>
            </div>

            <input type="file" id="postImageInput" accept="image/*" multiple style="display:none">
            <input type="file" id="postVideoInput" accept="video/*" style="display:none">

            <div class="composer-tools" id="cpToolsRow" style="display:flex; gap:16px; margin-top:12px; padding-top:10px; border-top:1px solid var(--border);">
                <label for="postImageInput" class="composer-tool-btn">🖼️ ছবি (৬টা পর্যন্ত)</label>
                <label for="postVideoInput" class="composer-tool-btn" id="cpVideoLabel">🎬 ভিডিও</label>
                <span class="composer-tool-btn" id="pollToggleBtn">📊 জরিপ</span>
            </div>

            <br>
            <button onclick="savePost()" class="primary-btn" id="cpSubmitBtn" style="width: 100%;">পোস্ট করুন</button>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html">🏠 ঘর</a>
        <a href="majlis.html">👥 মজলিস</a>
        <a href="create-post.html">➕ পোস্ট</a>
        <a href="news.html">🔔 খবর</a>
        <a href="more.html">☰ আরও</a>
    </nav>

    <div class="toast" id="toast"></div>

</div>
<script src="app.js?v=15"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const context = params.get('context'); // null | 'majlis' | 'newspage'
    const targetId = params.get('id');

    // ---------- পেজ কনটেক্সট অনুযায়ী UI সাজানো ----------
    (function setupContext() {
        if (context === 'majlis' && targetId) {
            const allMajlis = (window.Sylhetin && window.Sylhetin.getAllMajlisData) ? window.Sylhetin.getAllMajlisData() : {};
            const m = allMajlis[targetId];
            document.getElementById('cpSlogan').textContent = m ? m.name + '-এ পোস্ট করো' : 'মজলিসে পোস্ট করো';
            document.getElementById('cpContextLabel').textContent = m ? m.name : 'মজলিস';
            document.getElementById('cpCloseBtn').setAttribute('href', 'majlis-detail.html?id=' + targetId);
        } else if (context === 'newspage' && targetId) {
            const allPages = (window.Sylhetin && window.Sylhetin.getAllNewsPagesData) ? window.Sylhetin.getAllNewsPagesData() : {};
            const p = allPages[targetId];
            document.getElementById('cpTitle').firstChild.textContent = 'নতুন খবর';
            document.getElementById('cpSlogan').textContent = p ? p.name + '-এ পাবলিশ করো' : 'নিউজ পেজে পাবলিশ করো';
            document.getElementById('cpContextLabel').textContent = p ? p.name : 'নিউজ পেজ';
            document.getElementById('cpCloseBtn').setAttribute('href', 'news-page-detail.html?id=' + targetId);
            document.getElementById('newsFieldsBox').style.display = 'block';
            document.getElementById('postText').placeholder = 'সংক্ষিপ্ত বিবরণ ও পুরো খবর এইঠে লেখউক্কা...';
            document.getElementById('cpVideoLabel').style.display = 'none';
            document.getElementById('pollToggleBtn').style.display = 'none';
            document.getElementById('cpSubmitBtn').textContent = '📨 খবর পাবলিশ করো';
        } else {
            document.getElementById('cpCloseBtn').setAttribute('href', 'index.html');
        }
    })();

    let selectedImages = []; // একাধিক ছবির base64 লিস্ট
    let selectedVideoData = null;
    const MAX_IMAGES = 6;

    function renderImageThumbs() {
        const row = document.getElementById('imageThumbsRow');
        row.innerHTML = selectedImages.map(function (img, i) {
            return `<div class="image-thumb" style="background-image:url('${img}')">
                        <span class="thumb-remove" data-index="${i}">✕</span>
                    </div>`;
        }).join('');
        row.querySelectorAll('.thumb-remove').forEach(function (btn) {
            btn.addEventListener('click', function () {
                selectedImages.splice(parseInt(btn.getAttribute('data-index'), 10), 1);
                renderImageThumbs();
            });
        });
    }

    function hideVideoAndPoll() {
        document.getElementById('videoPreviewBox').style.display = 'none';
        document.getElementById('pollBuilderBox').style.display = 'none';
    }

    // ---------- ছবি (একাধিক) ----------
    document.getElementById('postImageInput').addEventListener('change', function () {
        const files = Array.from(this.files || []);
        if (files.length === 0) return;

        selectedVideoData = null;
        document.getElementById('postVideoInput').value = '';
        document.getElementById('videoPreviewBox').style.display = 'none';
        document.getElementById('pollBuilderBox').style.display = 'none';

        const room = MAX_IMAGES - selectedImages.length;
        if (room <= 0) {
            alert('সর্বোচ্চ ' + MAX_IMAGES + 'টা ছবি যোগ করা যাবে।');
            this.value = '';
            return;
        }
        const toAdd = files.slice(0, room);
        let loaded = 0;
        toAdd.forEach(function (file) {
            const reader = new FileReader();
            reader.onload = function (e) {
                selectedImages.push(e.target.result);
                loaded++;
                if (loaded === toAdd.length) renderImageThumbs();
            };
            reader.readAsDataURL(file);
        });
        this.value = '';
    });

    // ---------- ভিডিও ----------
    document.getElementById('postVideoInput').addEventListener('change', function () {
        const file = this.files[0];
        if (!file) return;
        if (file.size > 8 * 1024 * 1024) {
            alert('দুঃখিত, ৮ MB-এর বেশি সাইজের ভিডিও এই ডেমোতে সাপোর্ট করে না।');
            this.value = '';
            return;
        }
        const reader = new FileReader();
        reader.onload = function (e) {
            selectedImages = [];
            renderImageThumbs();
            document.getElementById('pollBuilderBox').style.display = 'none';
            selectedVideoData = e.target.result;
            document.getElementById('videoPreview').src = selectedVideoData;
            document.getElementById('videoPreviewBox').style.display = 'block';
        };
        reader.readAsDataURL(file);
    });
    document.getElementById('removeVideoBtn').addEventListener('click', function () {
        selectedVideoData = null;
        document.getElementById('postVideoInput').value = '';
        document.getElementById('videoPreviewBox').style.display = 'none';
    });

    // ---------- জরিপ (Poll) ----------
    function addPollOptionRow(value) {
        const list = document.getElementById('pollOptionsList');
        if (list.children.length >= 4) return;
        const row = document.createElement('div');
        row.className = 'poll-option-row';
        row.innerHTML = `
            <input type="text" class="poll-option-input" placeholder="অপশন" value="${value || ''}">
            <span class="poll-option-remove">✕</span>
        `;
        row.querySelector('.poll-option-remove').addEventListener('click', function () {
            if (list.children.length > 2) row.remove();
        });
        list.appendChild(row);
    }

    document.getElementById('pollToggleBtn').addEventListener('click', function () {
        selectedImages = [];
        renderImageThumbs();
        selectedVideoData = null;
        document.getElementById('postVideoInput').value = '';
        hideVideoAndPoll();
        document.getElementById('pollOptionsList').innerHTML = '';
        addPollOptionRow('');
        addPollOptionRow('');
        document.getElementById('pollBuilderBox').style.display = 'block';
    });

    document.getElementById('addPollOptionBtn').addEventListener('click', function () {
        addPollOptionRow('');
    });

    document.getElementById('removePollBtn').addEventListener('click', function () {
        document.getElementById('pollBuilderBox').style.display = 'none';
        document.getElementById('pollOptionsList').innerHTML = '';
    });

    // ---------- পোস্ট সেভ ----------
    function savePost() {
        const text = document.getElementById('postText').value.trim();

        // ---------- মজলিসে পোস্ট করা ----------
        if (context === 'majlis' && targetId) {
            if (text === '' && selectedImages.length === 0 && !selectedVideoData) {
                alert('দয়া করে কিছু লিখুন বা ছবি/ভিডিও যোগ করুন!');
                return;
            }
            const key = 'sylhetin_extra_posts_majlis_' + targetId;
            const list = JSON.parse(localStorage.getItem(key) || '[]');
            list.unshift({
                id: 'extra-' + Date.now(),
                author: 'আপনি',
                avatarLetter: '👤',
                time: 'এইমাত্র',
                text: text,
                images: selectedImages.length ? selectedImages : undefined,
                video: selectedVideoData || undefined
            });
            localStorage.setItem(key, JSON.stringify(list));
            window.location.href = 'majlis-detail.html?id=' + targetId;
            return;
        }

        // ---------- নিউজ পেজে খবর পাবলিশ করা ----------
        if (context === 'newspage' && targetId) {
            const headline = document.getElementById('newsHeadline').value.trim();
            const category = document.getElementById('newsCategory').value;
            const reporter = document.getElementById('newsReporter').value.trim();

            if (headline === '' || text === '') {
                alert('হেডলাইন আর বিবরণ দুটোই দেওয়া লাগবে!');
                return;
            }
            const key = 'sylhetin_extra_posts_newspage_' + targetId;
            const list = JSON.parse(localStorage.getItem(key) || '[]');
            list.unshift({
                id: 'extra-' + Date.now(),
                headline: headline,
                shortDescription: text,
                fullContent: text,
                category: category,
                publishDate: 'এইমাত্র',
                reporterName: reporter || null,
                images: selectedImages.length ? selectedImages : undefined
            });
            localStorage.setItem(key, JSON.stringify(list));
            if (window.Sylhetin) window.Sylhetin.showToast('খবর পাবলিশ করা হয়েছে!');
            setTimeout(function () {
                window.location.href = 'news-page-detail.html?id=' + targetId;
            }, 500);
            return;
        }

        // ---------- হোম ফিডে সাধারণ পোস্ট (আগের মতোই) ----------
        const pollVisible = document.getElementById('pollBuilderBox').style.display === 'block';
        let pollData = null;
        if (pollVisible) {
            const question = document.getElementById('pollQuestion').value.trim();
            const options = Array.from(document.querySelectorAll('.poll-option-input'))
                .map(function (inp) { return inp.value.trim(); })
                .filter(function (v) { return v !== ''; });
            if (question === '' || options.length < 2) {
                alert('জরিপর জন্য একটা প্রশ্ন আর কমপক্ষে দুইটা অপশন দেওয়া লাগবে!');
                return;
            }
            pollData = { question: question, options: options };
        }

        if (text === "" && selectedImages.length === 0 && !selectedVideoData && !pollData) {
            alert('দয়া করে কিছু লিখুন, ছবি/ভিডিও যোগ করুন, বা জরিপ বানান!');
            return;
        }

        localStorage.setItem('myNewPost', text);
        selectedImages.length ? localStorage.setItem('myNewPostImages', JSON.stringify(selectedImages)) : localStorage.removeItem('myNewPostImages');
        selectedVideoData ? localStorage.setItem('myNewPostVideo', selectedVideoData) : localStorage.removeItem('myNewPostVideo');
        pollData ? localStorage.setItem('myNewPostPoll', JSON.stringify(pollData)) : localStorage.removeItem('myNewPostPoll');

        window.location.href = 'index.html';
    }
</script>
</body>
</html>
