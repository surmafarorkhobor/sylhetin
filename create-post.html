<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নতুন পোস্ট | SylNet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
<div class="page-wrap">

    <header class="app-header">
        <div class="logo">নতুন পোস্ট<span class="slogan">নয়া কিতা অইলো?</span></div>
        <nav class="top-nav">
            <a href="index.html">✕</a>
        </nav>
    </header>

    <main class="container">
        <div class="card">
            <div class="post-head" style="padding:0 0 12px;">
                <div class="user-avatar">👤</div>
                <div class="meta">
                    <div class="user-name">আপনি</div>
                    <div class="post-time">ফেঞ্চুগঞ্জ ইউনিয়ন মজলিস</div>
                </div>
            </div>
            <textarea id="postText" placeholder="আফনার মনর কতা এইঠে লেখউক্কা..." style="width: 100%; height: 130px;"></textarea>
            <br><br>
            <button onclick="savePost()" class="primary-btn" style="width: 100%;">পোস্ট করুন</button>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html">🏠 ঘর</a>
        <a href="majlis.html">👥 মজলিস</a>
        <a href="create-post.html">➕ পোস্ট</a>
        <a href="news.html">🔔 খবর</a>
        <a href="more.html">☰ আরও</a>
    </nav>

</div>
<script src="app.js?v=4"></script>
<script>
    function savePost() {
        const text = document.getElementById('postText').value;
        if (text.trim() !== "") {
            localStorage.setItem('myNewPost', text);
            window.location.href = 'index.html';
        } else {
            alert('দয়া করে কিছু লিখুন!');
        }
    }
</script>
</body>
</html>
