<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sylhetin | আপনার ডিজিটাল ঘর</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=15">
</head>
<body>
<div class="page-wrap">

    <header class="app-header">
        <div class="logo">Sylhetin<span class="slogan">আমরা হখল ছিলটি</span></div>
        <nav class="top-nav">
            <a href="search.html">🔍</a>
            <a href="notifications.html">🔔</a>
            <a href="chat.html">💬</a>
            <a href="profile.html">👤</a>
        </nav>
    </header>

    <main class="container">

        <div class="card post-input-box" onclick="window.location.href='create-post.html'" style="cursor:pointer;">
            <div class="user-avatar">👤</div>
            <input type="text" placeholder="নয়া কিতা অইলো?" readonly style="cursor:pointer;">
        </div>

        <a href="news-detail.html?id=np1-a1" class="news-strip">
            <span class="tag">খবর</span>
            <span>শুরমাফারর খবর: সিলেটে আজ হালকা বৃষ্টির সম্ভাবনা</span>
        </a>

        <div class="chip-rail">
            <div class="chip active">ফেঞ্চুগঞ্জ ইউনিয়ন</div>
            <div class="chip">সিলেট জেলা</div>
            <div class="chip">প্রবাসী মজলিস</div>
        </div>

        <div id="feedContainer"></div>

        <div class="card">
            <h3>এনরে ছিনওনি?</h3>
            <div class="people-rail">
                <div class="person-card" data-user-id="u8">
                    <div class="user-avatar" style="width:56px;height:56px;font-size:20px;margin:0 auto 8px;">ম</div>
                    <div class="p-name">মিজানুর রহমান</div>
                    <div class="p-sub">বিয়ানীবাজার উপজেলা</div>
                    <button class="join-btn">যোগ করো</button>
                </div>
                <div class="person-card" data-user-id="u7">
                    <div class="user-avatar" style="width:56px;height:56px;font-size:20px;margin:0 auto 8px;">ন</div>
                    <div class="p-name">নাজমা আক্তার</div>
                    <div class="p-sub">সিলেট জেলা</div>
                    <button class="join-btn">যোগ করো</button>
                </div>
                <div class="person-card" data-user-id="u6">
                    <div class="user-avatar" style="width:56px;height:56px;font-size:20px;margin:0 auto 8px;">হ</div>
                    <div class="p-name">হাসান আলী</div>
                    <div class="p-sub">প্রবাসী মজলিস</div>
                    <button class="join-btn">যোগ করো</button>
                </div>
            </div>
        </div>

        <div id="feedContainerMore"></div>

    </main>

    <nav class="bottom-nav">
        <a href="index.html">🏠 ঘর</a>
        <a href="majlis.html">👥 মজলিস</a>
        <a href="create-post.html">➕ পোস্ট</a>
        <a href="news.html">🔔 খবর</a>
        <a href="more.html">☰ আরও</a>
    </nav>

    <div class="toast" id="toast"></div>

</div>
<script src="app.js?v=15"></script>
<script>
    // ---------- একটা পোস্ট কার্ডের HTML বানানোর জেনেরিক ফাংশন ----------
    // reusable for বন্ধুর পোস্ট, মজলিসের পোস্ট, নিউজ পেজের পোস্ট — তিনটার জন্যই (এখন app.js-এ আছে)
    const renderCard = window.Sylhetin.buildFeedCardHtml;

    function renderHomeFeed() {
        // ১) বন্ধুদের ডেমো পোস্ট
        const friendPosts = [
            { postId: 'p1', userId: 'u1', avatarText: 'র', name: 'আব্দুর রাজ্জাক', badge: '<span class="badge">যাচাইকৃত</span>', metaLine: '২ ঘন্টা আগে', bodyText: 'আজকের আবহাওয়াটা বেশ সুন্দর।' },
            { postId: 'p2', userId: 'u2', avatarText: 'আ', name: 'আরিফ চৌধুরী', metaLine: '৪ ঘন্টা আগে', bodyText: 'সিলেটের চা বাগানের দৃশ্যগুলো সব সময় মন ভালো করে দেয়।' },
            { postId: 'p3', userId: 'u3', avatarText: 'ছ', name: 'সাফিয়া বেগম', metaLine: 'গতকাল', bodyText: 'নতুন একটি সিলেটী কবিতার বই কিনলাম আজ, খুব ভালো লাগছে।' }
        ];

        let firstHalf = friendPosts.slice(0, 2).map(renderCard).join('');
        let secondHalf = friendPosts.slice(2).map(renderCard).join('');

        // ২) সব মজলিসের পোস্ট
        const allMajlis = (window.Sylhetin && window.Sylhetin.getAllMajlisData) ? window.Sylhetin.getAllMajlisData() : {};
        let majlisHtml = '';
        Object.keys(allMajlis).forEach(function (majId) {
            const m = allMajlis[majId];
            const posts = (window.Sylhetin && window.Sylhetin.getMajlisPosts) ? window.Sylhetin.getMajlisPosts(majId, m) : (m.posts || []).map(function (p, i) { return Object.assign({}, p, { fullId: majId + '-post-' + i }); });
            posts.forEach(function (post) {
                const authorUserId = (window.Sylhetin && window.Sylhetin.findUserIdByName) ? window.Sylhetin.findUserIdByName(post.author) : null;
                majlisHtml += renderCard({
                    postId: post.fullId,
                    userId: authorUserId,
                    avatarText: post.avatarLetter,
                    name: post.author,
                    badge: `<span class="badge">👥 মজলিস</span>`,
                    metaLine: post.time + ' · <a href="majlis-detail.html?id=' + majId + '" style="color:var(--green-deep); font-weight:600;">' + m.name + '</a>',
                    bodyText: post.text,
                    images: post.images
                });
            });
        });

        // ৩) সব নিউজ পেজের পোস্ট
        const allNewsPages = (window.Sylhetin && window.Sylhetin.getAllNewsPagesData) ? window.Sylhetin.getAllNewsPagesData() : {};
        let newsHtml = '';
        Object.keys(allNewsPages).forEach(function (pageId) {
            const page = allNewsPages[pageId];
            const verifiedBadge = page.verified ? '<span class="badge">✅ যাচাইকৃত</span>' : (page.status === 'pending' ? '<span class="badge" style="background:#FFF3CD; color:#8A6D00;">⏳ পর্যালোচনাধীন</span>' : '');
            const posts = (window.Sylhetin && window.Sylhetin.getNewsPagePosts) ? window.Sylhetin.getNewsPagePosts(pageId, page) : (page.posts || []).map(function (p) { return Object.assign({}, p, { fullId: pageId + '-' + p.id }); });
            posts.forEach(function (post) {
                newsHtml += renderCard({
                    postId: post.fullId,
                    avatarText: page.logoImage ? '' : page.logo,
                    avatarImage: page.logoImage,
                    roundedSquare: true,
                    name: page.name,
                    badge: verifiedBadge,
                    metaLine: post.category + ' · ' + post.publishDate,
                    headline: post.headline,
                    bodyText: post.shortDescription,
                    headHref: 'news-page-detail.html?id=' + pageId,
                    linkHref: 'news-detail.html?id=' + post.fullId,
                    images: post.images
                });
            });
        });

        document.getElementById('feedContainer').innerHTML = firstHalf + majlisHtml;
        document.getElementById('feedContainerMore').innerHTML = newsHtml + secondHalf;

        document.querySelectorAll('.post[data-post-id]').forEach(function (postEl) {
            if (window.Sylhetin) {
                window.Sylhetin.renderCommentsFor(postEl);
                window.Sylhetin.renderShareCountFor(postEl);
            }
        });
        if (window.Sylhetin && window.Sylhetin.restoreSaveStates) {
            window.Sylhetin.restoreSaveStates(document);
        }
    }

    renderHomeFeed();

    window.onload = function() {
        const savedPost = localStorage.getItem('myNewPost');
        const savedImagesRaw = localStorage.getItem('myNewPostImages');
        const savedImages = savedImagesRaw ? JSON.parse(savedImagesRaw) : [];
        const savedVideo = localStorage.getItem('myNewPostVideo');
        const savedPollRaw = localStorage.getItem('myNewPostPoll');
        const savedPoll = savedPollRaw ? JSON.parse(savedPollRaw) : null;

        if (savedPost !== null && savedPost !== undefined && (savedPost !== '' || savedImages.length || savedVideo || savedPoll)) {
            const feedContainer = document.getElementById('feedContainer');
            const newId = 'new-' + Date.now();

            const imageHtml = window.Sylhetin.buildImagesGridHtml(savedImages);
            const videoHtml = savedVideo ? `<video src="${savedVideo}" controls style="width:100%; display:block; margin-bottom:2px; background:#000;"></video>` : '';

            let pollHtml = '';
            if (savedPoll) {
                let optionsHtml = '';
                savedPoll.options.forEach(function (opt) {
                    optionsHtml += `
                        <button type="button" class="poll-option">
                            <span class="poll-bar"></span>
                            <span class="poll-option-content">
                                <span class="poll-label">${opt}</span>
                                <span class="poll-pct"></span>
                            </span>
                        </button>`;
                });
                pollHtml = `
                    <div class="poll-box" data-poll-id="${newId}">
                        <div class="poll-question">${savedPoll.question}</div>
                        ${optionsHtml}
                        <div class="poll-total"></div>
                    </div>`;
            }

            const cardHtml = renderCard({
                postId: newId,
                avatarText: '👤',
                name: 'আপনি (এখনই)',
                metaLine: 'এইমাত্র',
                bodyText: savedPost || ''
            });

            // মিডিয়া/জরিপ (যদি থাকে) পোস্ট-অ্যাকশন বারের ঠিক আগে বসানো হচ্ছে
            const wrapper = document.createElement('div');
            wrapper.innerHTML = cardHtml;
            const cardEl = wrapper.firstElementChild;
            const postActionsEl = cardEl.querySelector('.post-actions');
            if (imageHtml) postActionsEl.insertAdjacentHTML('beforebegin', imageHtml);
            if (videoHtml) postActionsEl.insertAdjacentHTML('beforebegin', videoHtml);
            if (pollHtml) postActionsEl.insertAdjacentHTML('beforebegin', pollHtml);

            feedContainer.insertBefore(cardEl, feedContainer.firstChild);

            localStorage.removeItem('myNewPost');
            localStorage.removeItem('myNewPostImages');
            localStorage.removeItem('myNewPostVideo');
            localStorage.removeItem('myNewPostPoll');
            if (window.Sylhetin && window.Sylhetin.renderCommentsFor) {
                window.Sylhetin.renderCommentsFor(cardEl);
                window.Sylhetin.renderShareCountFor(cardEl);
            }
            if (savedPoll && window.Sylhetin && window.Sylhetin.renderPollResults) {
                window.Sylhetin.renderPollResults(cardEl.querySelector('.poll-box'));
            }
        }
    };
</script>
</body>
</html>
