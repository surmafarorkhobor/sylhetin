<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>খবর | Sylhetin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=8">
</head>
<body>
<div class="page-wrap">

    <header class="app-header">
        <div class="logo">খবর<span class="slogan">অফিসিয়াল নিউজ হাব</span></div>
        <nav class="top-nav">
            <a href="index.html">🏠</a>
        </nav>
    </header>

    <main class="container" id="newsPagesContainer">
        <!-- JS দিয়ে ভরা হবে -->
    </main>

    <nav class="bottom-nav">
        <a href="index.html">🏠 ঘর</a>
        <a href="majlis.html">👥 মজলিস</a>
        <a href="create-post.html">➕ পোস্ট</a>
        <a href="news.html">🔔 খবর</a>
        <a href="more.html">☰ আরও</a>
    </nav>

    <div class="toast" id="toast"></div>

</div>
<script src="app.js?v=8"></script>
<script>
    (function () {
        const pagesData = (window.Sylhetin && window.Sylhetin.newsPagesData) || {};
        const container = document.getElementById('newsPagesContainer');
        let html = '<div class="empty-note" style="margin:14px 16px 6px; text-align:left; padding:0;">যাচাইকৃত সংবাদমাধ্যমের পেজ থেকে খবর — শুধু অনুমোদিত Newspaper/Online Portal/Television-ই এখানে পোস্ট করতে পারে।</div>';
        html += '<div class="card" style="padding:0;">';

        Object.keys(pagesData).forEach(function (pageId) {
            const page = pagesData[pageId];
            const verifiedBadge = page.verified ? '<span class="badge">✅ যাচাইকৃত</span>' : '';
            html += `
                <div class="majlis-item news-page-item" data-news-page-id="${pageId}">
                    <div class="majlis-icon">${page.logo}</div>
                    <div class="info">
                        <div class="name">${page.name} ${verifiedBadge}</div>
                        <div class="members">${page.pageType} · ${page.followers} ফলোয়ার</div>
                    </div>
                    <button type="button" class="follow-btn" data-user-id="${pageId}">👁️ ফলো</button>
                </div>
            `;
        });

        html += '</div>';
        container.innerHTML = html;

        if (window.Sylhetin && window.Sylhetin.restoreJoinStates) {
            // follow-btn অবস্থা রিস্টোর হয় app.js-এর সাধারণ DOMContentLoaded লজিক দিয়েই
        }
    })();
</script>
</body>
</html>
