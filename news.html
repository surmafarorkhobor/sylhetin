<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>খবর | Sylhetin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=13">
</head>
<body>
<div class="page-wrap">

    <header class="app-header">
        <div class="logo">খবর<span class="slogan">অফিসিয়াল নিউজ হাব</span></div>
        <nav class="top-nav">
            <a href="index.html">🏠</a>
        </nav>
    </header>

    <main class="container" id="newsPagesContainer">
        <!-- JS দিয়ে ভরা হবে (Create বাটনসহ) -->
    </main>

    <nav class="bottom-nav">
        <a href="index.html">🏠 ঘর</a>
        <a href="majlis.html">👥 মজলিস</a>
        <a href="create-post.html">➕ পোস্ট</a>
        <a href="news.html">🔔 খবর</a>
        <a href="more.html">☰ আরও</a>
    </nav>

    <div class="toast" id="toast"></div>

</div>
<script src="app.js?v=13"></script>
<script>
    (function () {
        const pagesData = (window.Sylhetin && window.Sylhetin.getAllNewsPagesData) ? window.Sylhetin.getAllNewsPagesData() : {};
        const container = document.getElementById('newsPagesContainer');
        let html = '<a href="create-news-page.html" class="create-cta-btn">➕ নতুন নিউজ পেজ তৈরি করো</a>';
        html += '<div class="empty-note" style="margin:0 0 12px; text-align:left; padding:0;">যাচাইকৃত সংবাদমাধ্যমের পেজ থেকে খবর — শুধু অনুমোদিত Newspaper/Online Portal/Television-ই এখানে পোস্ট করতে পারে।</div>';
        html += '<div class="card" style="padding:0;">';

        Object.keys(pagesData).forEach(function (pageId) {
            const page = pagesData[pageId];
            const verifiedBadge = page.verified ? '<span class="badge">✅ যাচাইকৃত</span>' : (page.status === 'pending' ? '<span class="badge" style="background:#FFF3CD; color:#8A6D00;">⏳ পর্যালোচনাধীন</span>' : '');
            const iconStyle = page.logoImage ? `background-image:url('${page.logoImage}'); background-size:cover; background-position:center;` : '';
            html += `
                <div class="majlis-item news-page-item" data-news-page-id="${pageId}">
                    <div class="majlis-icon" style="${iconStyle}">${page.logoImage ? '' : page.logo}</div>
                    <div class="info">
                        <div class="name">${page.name} ${verifiedBadge}</div>
                        <div class="members">${page.pageType} · ${page.followers || '০'} ফলোয়ার</div>
                    </div>
                    <button type="button" class="follow-btn" data-user-id="${pageId}">👁️ ফলো</button>
                </div>
            `;
        });

        html += '</div>';
        container.innerHTML = html;
    })();
</script>
</body>
</html>
