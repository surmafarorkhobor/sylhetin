<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>খবরের বিস্তারিত | Sylhetin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=13">
</head>
<body>
<div class="page-wrap">

    <header class="app-header">
        <div class="logo">খবরের বিস্তারিত<span class="slogan" id="ndPageName">লোড হচ্ছে...</span></div>
        <nav class="top-nav">
            <a href="news.html">←</a>
        </nav>
    </header>

    <main class="container" id="ndContainer">
        <!-- JS দিয়ে ভরা হবে -->
    </main>

    <nav class="bottom-nav">
        <a href="index.html">🏠 ঘর</a>
        <a href="majlis.html">👥 মজলিস</a>
        <a href="create-post.html">➕ পোস্ট</a>
        <a href="news.html">🔔 খবর</a>
        <a href="more.html">☰ আরও</a>
    </nav>

</div>
<script src="app.js?v=13"></script>
<script>
    (function () {
        const params = new URLSearchParams(window.location.search);
        const fullId = params.get('id');
        const result = (window.Sylhetin && window.Sylhetin.findNewsPost) ? window.Sylhetin.findNewsPost(fullId) : null;
        const container = document.getElementById('ndContainer');

        if (!result) {
            container.innerHTML = '<div class="card"><p>দুঃখিত, এই খবরটি পাওয়া যায়নি।</p></div>';
            return;
        }

        const page = result.page;
        const post = result.post;
        const verifiedBadge = page.verified ? '<span class="badge">✅ যাচাইকৃত</span>' : '';
        const reporterLine = post.reporterName ? '<br>প্রতিবেদক: ' + post.reporterName : '';

        document.getElementById('ndPageName').textContent = page.name;

        container.innerHTML = `
            <div class="card">
                <div class="post-head" onclick="window.location.href='news-page-detail.html?id=${result.pageId}'" style="cursor:pointer; padding:0 0 12px;">
                    <div class="user-avatar" style="border-radius:12px;">${page.logo}</div>
                    <div class="meta">
                        <div class="user-name">${page.name} ${verifiedBadge}</div>
                        <div class="post-time">${post.category} · ${post.publishDate}</div>
                    </div>
                </div>
                <div class="news-title" style="font-size:16px; margin-bottom:10px;">${post.headline}</div>
                <p style="font-size:13.5px; line-height:1.75; color:var(--text);">${post.fullContent}</p>
                ${reporterLine ? '<p style="font-size:11.5px; color:var(--text-soft); margin-top:12px;">' + reporterLine + '</p>' : ''}
            </div>
        `;
    })();
</script>
</body>
</html>
